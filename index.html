<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uncoverups</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000000;
      color: #ffffff;
      font-family: 'Libre Franklin', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    a {
      text-decoration: none;
      color:#000000;
    }

    a:hover {
      color:#ffffff;
    }

    .top-rule {
      width: 100%;
      height: 3px;
      background: #1a1a1a;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20vh;
      width: 100%;
      max-width: 520px;
      padding-left: 24px;
      padding-right: 24px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #e0e0e0;
      margin-bottom: 28px;
    }

    .header {
      font-family: 'Libre Franklin', sans-serif;
      font-size: clamp(42px, 8vw, 64px);
      font-weight: 700;
      letter-spacing: -0.01em;
      text-align: center;
      color: #f8f8f8;
      line-height: 1;
      margin-bottom: 12px;
    }

    .subheader {
      font-size: clamp(13px, 2vw, 15px);
      font-weight: 400;
      color: #acacac;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 36px;
      max-width: 340px;
    }

    .divider-bottom {
      width: 100%;
      height: 1px;
      background: #e0e0e0;
      margin-bottom: 32px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 360px;
    }
    
    /*
      Strategy: the .btn-wrap is the clipping parent.
      The image is absolutely positioned, starting fully
      behind the button (translateX(0)), then slides right
      on hover. overflow:hidden on the wrap clips it until
      it clears the button edge.
    */

    .btn-wrap {
      position: relative;
      /* extra right padding makes room for the image to slide into */
      width: 100%;

      /* defaults - overridden in button inline */
      --slide-x: 0px;
      --slide-y: 0px;
      --anchor-left: auto;
      --anchor-right: 2px;
      --anchor-top: 2px;
      --anchor-bottom: auto;
      --popout-width: 75px;
      --popout-height: calc(100% - 4px);
    }

    .btn {
      position: relative;
      z-index: 2;
      display: block;
      width: 100%;
      padding: 14px 20px;
      border-radius: 40px;
      border: 2px solid #1a1a1a;
      background: #ffffff;
      color: #1a1a1a;
      font-family: 'Libre Franklin', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .btn:hover {
      background: #1a1a1a;
      color: #ffffff;
    }

    .btn:active { opacity: 0.8; }

    /* Image slides out from behind the right side of the button */
    .popout {
      position: absolute;
      top:    var(--anchor-top);
      bottom: var(--anchor-bottom);
      left:   var(--anchor-left);
      right:  var(--anchor-right);
      width:  var(--popout-width);
      height: var(--popout-height);
      border-radius: 0 38px 38px 0;
      overflow: hidden;
      z-index: 1;                /* behind button (which is z-index 2) */
      /* Start: fully hidden under button — translateX(0) */
      transform: translateX(0px);
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-wrap:hover .popout {
      transform: translateX(var(--slide-x)) translateY(var(--slide-y)); /* slide directrion and magnitude */
    }

    .popout img {
      width: 75%;
      height: 75%;
      object-fit: scale-down;
      display: block;
      border-radius: 0 38px 38px 0;
    }

    .footer-note {
      margin-top: 28px;
      font-size: 13px;
      color: #9b9b9b;
      text-align: center;
    }

    .footer-note a {
      color: #e4e9e2;
      text-underline-offset: 2px;
    }
  </style>
</head>
<body>

  <div class="top-rule"></div>

  <div class="page">
    <img src="images/yarn.png">
    

    <h1 class="header">Uncoverups</h1>
    <p class="subheader">Connect related ideas to expose absurd conspiracies</p>

    

    <div class="buttons">
      <div class="btn-wrap" style="
        --anchor-right: 2px; --anchor-left: auto;
        --anchor-top: 2px; --anchor-bottom: auto;
        --slide-x: 79px; --slide-y: -30px;
        --popout-radius: 0 38px 38px 0;
        --popout-width: 75px; --popout-height: calc(100% - 4px);
          ">
        <a href="3x3_puzz_1.html"><button class="btn">3x3 Puzzle 1</button></a>
        <div class="popout"><img src="images/icon_sphere.png"></div>
      </div>
      <div class="btn-wrap" style="
        --anchor-right: auto; --anchor-left: 2px;
        --anchor-top: 2px; --anchor-bottom: auto;
        --slide-x: -79px;
        --popout-radius: 0 38px 38px 0;
        --popout-width: 75px; --popout-height: calc(100% - 4px);
        ">
        <a href="3x3_puzz_2.html"><button class="btn">3x3 Puzzle 2</button></a>
        <div class="popout"><img src="images/icon_usflag.png"></div>
      </div>
      <div class="btn-wrap" style="
        --anchor-right: 2px; --anchor-left: auto;
        --anchor-top: 2px; --anchor-bottom: auto;
        --slide-x: 79px;
        --popout-radius: 0 38px 38px 0;
        --popout-width: 75px; --popout-height: calc(100% - 4px);
        ">
        <a href="4x3_puzz_2.html"><button class="btn">4x3 Puzzle 1</button></a>
        <div class="popout"><img src="images/icon_ufo.png"></div>
      </div>
      <div class="btn-wrap" style="
        --anchor-right: auto; --anchor-left: 2px;
        --anchor-top: 2px; --anchor-bottom: auto;
        --slide-x: -79px;
        --popout-radius: 0 38px 38px 0;
        --popout-width: 75px; --popout-height: calc(100% - 4px);
        ">
        <a href="4x3_puzz_4.html"><button class="btn">4x3 Puzzle 2</button></a>
        <div class="popout"><img src="images/icon_fear.png"></div>
      </div>
      <div class="btn-wrap" style="
        --anchor-right: auto; --anchor-left: 2px;
        --anchor-top: 2px; --anchor-bottom: auto;
        --slide-x: -79px; --slide-y: -30px;
        --popout-radius: 0 38px 38px 0;
        --popout-width: 75px; --popout-height: calc(100% - 4px);
        ">
        <a href="4x4_puzz_2.html"><button class="btn">4x4 Puzzle 1</button></a>
        <div class="popout"><img src="images/icon_boat.png"></div>
      </div>
    </div>
    <p class="footer-note">A game by <a href="https://davekornfeld.com/">me</a></p>
  </div>

</body>
</html>
